{% load i18n %}
<div class="panel" data-panel-for="course">
  <h2>{{ course.title }}</h2>
  <p class="panel__meta">{{ course.get_language_display }} · {{ course.get_visibility_display }}</p>
  <a class="btn btn--ghost btn--small" href="{% url 'courses:manage_course_edit' slug=course.slug %}">{% trans "Edit course metadata" %}</a>
  <a class="btn btn--ghost btn--small" href="{% url 'courses:manage_media' slug=course.slug %}">{% trans "Media library" %}</a>
  <a class="btn btn--ghost btn--small" href="{% url 'courses:manage_review_queue' slug=course.slug %}">{% trans "Quiz review" %}</a>
</div>
