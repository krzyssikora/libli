{% load i18n %}
<div class="addwrap" data-add-menu>
  <button type="button" class="addbtn" data-add-toggle>＋ {% trans "Add element" %}</button>
  <div class="typemenu" hidden data-type-menu>
    <p class="typemenu__group-label">{% trans "Content" %}</p>
    <div class="typemenu__group">
      <button type="button" class="typecard" data-add-type="text"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-text"/></svg>{% trans "Text" %}</button>
      <button type="button" class="typecard" data-add-type="image"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-image"/></svg>{% trans "Image" %}</button>
      <button type="button" class="typecard" data-add-type="video"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-video"/></svg>{% trans "Video" %}</button>
      <button type="button" class="typecard" data-add-type="iframe"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-iframe"/></svg>{% trans "Iframe" %}</button>
      <button type="button" class="typecard" data-add-type="math"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-math"/></svg>{% trans "Math" %}</button>
      <button type="button" class="typecard" data-add-type="html"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-html"/></svg>{% trans "HTML" %}</button>
      <button type="button" class="typecard" data-add-type="table"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-table"/></svg>{% trans "Table" %}</button>
      <button type="button" class="typecard" data-add-type="gallery"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-gallery"/></svg>{% trans "Gallery" %}</button>
    </div>
    <p class="typemenu__group-label">{% trans "Questions" %}</p>
    <div class="typemenu__group">
      <button type="button" class="typecard" data-add-type="choice-single"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-choice-single"/></svg>{% trans "Single choice" %}</button>
      <button type="button" class="typecard" data-add-type="choice-multi"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-choice-multi"/></svg>{% trans "Multiple choice" %}</button>
      <button type="button" class="typecard" data-add-type="shorttextquestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-shorttext"/></svg>{% trans "Short text" %}</button>
      <button type="button" class="typecard" data-add-type="shortnumericquestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-shortnumeric"/></svg>{% trans "Short numeric" %}</button>
      <button type="button" class="typecard" data-add-type="fillblankquestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-fillblank"/></svg>{% trans "Fill in the blanks" %}</button>
      <button type="button" class="typecard" data-add-type="dragfillblankquestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-dragwords"/></svg>{% trans "Drag the words" %}</button>
      <button type="button" class="typecard" data-add-type="matchpairquestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-matchpairs"/></svg>{% trans "Match pairs" %}</button>
      <button type="button" class="typecard" data-add-type="dragtoimagequestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-dragimage"/></svg>{% trans "Drag to image" %}</button>
      <button type="button" class="typecard" data-add-type="extendedresponsequestion"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-extended"/></svg>{% trans "Extended response" %}</button>
    </div>
    <p class="typemenu__group-label">{% trans "Structure" %}</p>
    <div class="typemenu__group">
      <button type="button" class="typecard" data-add-type="slidebreak"><svg class="ic" aria-hidden="true" focusable="false"><use href="#el-slidebreak"/></svg>{% trans "Slide break" %}</button>
    </div>
  </div>
</div>
