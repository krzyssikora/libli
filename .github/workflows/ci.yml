name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: libli
          POSTGRES_PASSWORD: libli
          POSTGRES_DB: libli
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://libli:libli@localhost:5432/libli
      DJANGO_SECRET_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python -m pytest
      - run: uv run python manage.py migrate        # verify the real deploy path
      - run: uv run python manage.py setup_roles     # asserts seed_roles works post-migrate
      - run: uv run playwright install --with-deps chromium
      - run: uv run python -m pytest -m e2e
